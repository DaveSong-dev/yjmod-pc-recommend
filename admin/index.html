<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>품절 관리 · 영재컴퓨터</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #181c27;
      --border: #2a3142;
      --text: #e8eaef;
      --muted: #8b93a7;
      --accent: #6c9eff;
      --danger: #f87171;
      --ok: #4ade80;
      --purple: #a78bfa;
      --radius: 12px;
      --font: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font);
      background: radial-gradient(1200px 600px at 10% -10%, #1a2240 0%, transparent 55%), var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 1.25rem; }
    h1 { font-size: 1.35rem; font-weight: 700; margin: 0 0 0.25rem; letter-spacing: -0.02em; }
    .sub { color: var(--muted); font-size: 0.875rem; margin-bottom: 1.5rem; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 0.35rem; }
    input[type="password"] {
      width: 100%;
      max-width: 280px;
      padding: 0.65rem 0.85rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #0c0e14;
      color: var(--text);
      font-size: 1rem;
    }
    input:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
    .row { display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: flex-end; margin-top: 0.75rem; }
    button {
      font-family: inherit;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      padding: 0.6rem 1rem;
      font-size: 0.9rem;
      font-weight: 600;
    }
    .btn-primary { background: linear-gradient(135deg, #4f74ff, #6c9eff); color: #fff; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-revive {
      background: rgba(74, 222, 128, 0.15);
      color: var(--ok);
      border: 1px solid rgba(74, 222, 128, 0.35);
      padding: 0.35rem 0.65rem;
      font-size: 0.8rem;
    }
    .btn-revive:disabled { opacity: 0.45; cursor: not-allowed; }
    .hidden { display: none !important; }
    .msg { font-size: 0.85rem; margin-top: 0.75rem; }
    .msg.err { color: var(--danger); }
    .msg.ok { color: var(--ok); }
    .table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin-top: 0.5rem;
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; min-width: 640px; }
    th, td {
      padding: 0.65rem 0.75rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    th { background: #12151f; color: var(--muted); font-weight: 600; white-space: nowrap; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }
    .badge { display: inline-block; padding: 0.15rem 0.45rem; border-radius: 6px; font-size: 0.72rem; font-weight: 600; }
    .badge-revived {
      background: rgba(167, 139, 250, 0.2);
      color: var(--purple);
      border: 1px solid rgba(167, 139, 250, 0.35);
    }
    .badge-soldout {
      background: rgba(248, 113, 113, 0.12);
      color: var(--danger);
      border: 1px solid rgba(248, 113, 113, 0.25);
    }
    .toolbar { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
    .price { font-variant-numeric: tabular-nums; white-space: nowrap; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>품절 · 보류 상품 관리</h1>
    <p class="sub">PIN 인증 후 목록을 확인하고 GitHub에 복원 상태를 반영합니다.</p>

    <section id="pin-panel" class="card">
      <label for="pin-input">관리자 PIN</label>
      <div class="row">
        <input id="pin-input" type="password" autocomplete="current-password" placeholder="PIN 입력" />
        <button type="button" class="btn-primary" id="btn-login">확인</button>
      </div>
      <p id="pin-msg" class="msg err hidden"></p>
    </section>

    <section id="dash-panel" class="hidden">
      <div class="toolbar">
        <span class="sub" style="margin:0" id="dash-welcome">대시보드</span>
        <div>
          <button type="button" class="btn-ghost" id="btn-refresh">새로고침</button>
          <button type="button" class="btn-ghost" id="btn-logout">로그아웃</button>
        </div>
      </div>
      <div class="card">
        <p id="load-msg" class="msg"></p>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>상품명</th>
                <th>가격</th>
                <th>티어</th>
                <th>기록일시</th>
                <th>상태</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
    </section>
  </div>

  <script>
    (function () {
      var adminPin = '';
      var pinInput = document.getElementById('pin-input');
      var btnLogin = document.getElementById('btn-login');
      var pinMsg = document.getElementById('pin-msg');
      var pinPanel = document.getElementById('pin-panel');
      var dashPanel = document.getElementById('dash-panel');
      var tbody = document.getElementById('tbody');
      var loadMsg = document.getElementById('load-msg');
      var btnRefresh = document.getElementById('btn-refresh');
      var btnLogout = document.getElementById('btn-logout');

      function esc(s) {
        return String(s == null ? '' : s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/"/g, '&quot;');
      }

      function formatPrice(n) {
        var x = Number(n);
        if (!isFinite(x)) return '-';
        return x.toLocaleString('ko-KR') + '원';
      }

      function showPinErr(t) {
        pinMsg.textContent = t || '';
        pinMsg.classList.toggle('hidden', !t);
        pinMsg.classList.toggle('err', !!t);
      }

      async function postJson(url, body) {
        var r = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body || {}),
        });
        var data = null;
        try { data = await r.json(); } catch (e) { data = null; }
        return { ok: r.ok, status: r.status, data: data };
      }

      async function verifyPin() {
        var pin = String(pinInput.value || '').trim();
        showPinErr('');
        if (!pin) {
          showPinErr('PIN을 입력하세요.');
          return;
        }
        btnLogin.disabled = true;
        try {
          var res = await postJson('/api/admin-auth', { adminPin: pin });
          if (res.ok && res.data && res.data.ok) {
            adminPin = pin;
            pinPanel.classList.add('hidden');
            dashPanel.classList.remove('hidden');
            await loadLog();
          } else {
            showPinErr('PIN이 올바르지 않습니다.');
          }
        } catch (e) {
          showPinErr('네트워크 오류: ' + (e.message || e));
        } finally {
          btnLogin.disabled = false;
        }
      }

      function renderRows(log) {
        tbody.innerHTML = '';
        var list = (log && log.soldout) || [];
        if (!list.length) {
          loadMsg.textContent = '기록된 품절·보류 상품이 없습니다.';
          loadMsg.className = 'msg';
          return;
        }
        loadMsg.textContent = '총 ' + list.length + '건';
        loadMsg.className = 'msg ok';

        list.forEach(function (p) {
          var tr = document.createElement('tr');
          var id = String(p.id != null ? p.id : '');
          var revived = !!p.revived;
          var statusHtml = revived
            ? '<span class="badge badge-revived">복원됨</span>'
            : '<span class="badge badge-soldout">보류</span>';
          tr.innerHTML =
            '<td>' + esc(id) + '</td>' +
            '<td>' + esc(p.name) + '</td>' +
            '<td class="price">' + esc(formatPrice(p.price)) + '</td>' +
            '<td>' + esc(p.tier) + '</td>' +
            '<td>' + esc(p.soldout_at || '') + '</td>' +
            '<td>' + statusHtml + '</td>' +
            '<td></td>';
          var tdBtn = tr.querySelector('td:last-child');
          var btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'btn-revive';
          btn.textContent = '복원';
          btn.disabled = revived;
          btn.dataset.id = id;
          btn.addEventListener('click', function () { reviveProduct(id, btn); });
          tdBtn.appendChild(btn);
          tbody.appendChild(tr);
        });
      }

      async function loadLog() {
        loadMsg.textContent = '불러오는 중…';
        loadMsg.className = 'msg';
        tbody.innerHTML = '';
        try {
          var r = await fetch('/data/soldout_log.json?t=' + Date.now(), { cache: 'no-store' });
          if (!r.ok) {
            loadMsg.textContent = 'soldout_log.json을 불러올 수 없습니다 (' + r.status + ').';
            loadMsg.className = 'msg err';
            return;
          }
          var log = await r.json();
          renderRows(log);
        } catch (e) {
          loadMsg.textContent = '불러오기 실패: ' + (e.message || e);
          loadMsg.className = 'msg err';
        }
      }

      async function reviveProduct(productId, btn) {
        if (!adminPin || !productId) return;
        btn.disabled = true;
        try {
          var res = await postJson('/api/revive-product', {
            productId: productId,
            adminPin: adminPin,
          });
          if (res.ok && res.data && res.data.success) {
            await loadLog();
          } else {
            var err = (res.data && res.data.error) || ('오류 ' + res.status);
            alert(err);
            btn.disabled = false;
          }
        } catch (e) {
          alert('요청 실패: ' + (e.message || e));
          btn.disabled = false;
        }
      }

      function logout() {
        adminPin = '';
        pinInput.value = '';
        dashPanel.classList.add('hidden');
        pinPanel.classList.remove('hidden');
        showPinErr('');
        tbody.innerHTML = '';
        loadMsg.textContent = '';
      }

      btnLogin.addEventListener('click', verifyPin);
      pinInput.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') verifyPin();
      });
      btnRefresh.addEventListener('click', loadLog);
      btnLogout.addEventListener('click', logout);
    })();
  </script>
</body>
</html>
